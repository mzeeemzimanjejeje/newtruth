kind = "web"
previewPath = "/"
title = "TRUTH MD Pairing Portal"
version = "1.0.0"
id = "artifacts/truth-md"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20889
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/truth-md run dev"

[services.env]
PORT = "20889"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/truth-md", "run", "build"]
publicDir = "artifacts/truth-md/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
