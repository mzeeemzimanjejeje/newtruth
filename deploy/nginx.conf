# TRUTH-MD Pairing Site - Nginx Config
# Place this file at: /etc/nginx/sites-available/truth-md
# Then run:
#   sudo ln -s /etc/nginx/sites-available/truth-md /etc/nginx/sites-enabled/truth-md
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name newpair.courtneytech.xyz;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name newpair.courtneytech.xyz;

    # SSL - managed by Certbot
    # Run: sudo certbot --nginx -d newpair.courtneytech.xyz
    ssl_certificate /etc/letsencrypt/live/newpair.courtneytech.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newpair.courtneytech.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Proxy all traffic to the Node.js server
    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increased timeouts for WhatsApp pairing requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
